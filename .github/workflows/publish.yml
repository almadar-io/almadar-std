name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      # pnpm/action-setup@v4 (NOT @v6, which ignored `version:` and installed a
      # pnpm 11 beta). With no `version:` input it reads the exact pnpm from
      # package.json `packageManager` (pnpm@10.30.3). Must run BEFORE setup-node
      # so pnpm is on PATH when setup-node@v5 reads `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pnpm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
