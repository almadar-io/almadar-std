name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # pnpm/action-setup@v6 was observed installing pnpm 11.0.0-beta.4-1
      # despite `version: 10.30.3` — the `version:` spec is ignored on that
      # action version. Bypass it: install pnpm via npm with an exact pin.
      - name: Install pnpm 10.30.3 via npm
        run: npm install -g pnpm@10.30.3
      - run: pnpm --version
      - run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pnpm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
