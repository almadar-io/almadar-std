name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      # pnpm/action-setup@v6 ignores the `version:` spec on some minor
      # versions (observed installing 11.0.0-beta.4-1 when asked for 10.30.3).
      # Install pnpm via npm with an exact pin instead.
      - name: Install pnpm 10.30.3 via npm
        run: npm install -g pnpm@10.30.3
      - run: pnpm --version
      - run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            pnpm test
          else
            echo "no test script; skipping"
          fi

      - name: Lint
        run: pnpm exec eslint --no-warn-ignored --max-warnings 0 .

  # validate-service disabled (service .orb schemas need fixing)
